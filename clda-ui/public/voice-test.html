<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小智语音测试</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06060c;
  --surface: #10101a;
  --surface2: #1a1a2e;
  --accent: #00e4a0;
  --accent-dim: #00e4a030;
  --accent-glow: #00e4a060;
  --red: #ff4060;
  --text: #d8d8e4;
  --text-muted: #5a5a72;
  --radius: 16px;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'Noto Sans SC', sans-serif;
}

html, body { height: 100%; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% 40%, #0d1a2a 0%, transparent 70%),
    radial-gradient(circle at 20% 80%, #0a1520 0%, transparent 40%);
}

/* Grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--text-muted) 1px, transparent 1px),
    linear-gradient(90deg, var(--text-muted) 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0.03;
  pointer-events: none;
}

#app {
  width: 420px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
}

header {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
  color: var(--accent);
  padding: 20px 0 12px;
  opacity: 0.9;
}

.status-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 8px 16px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: background 0.3s, box-shadow 0.3s;
}

.status-dot.connected {
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
}

.status-dot.error {
  background: var(--red);
  box-shadow: 0 0 8px #ff406060;
}

.chat-area {
  flex: 1;
  min-height: 240px;
  max-height: 380px;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
  mask-image: linear-gradient(transparent, black 20px, black calc(100% - 20px), transparent);
  -webkit-mask-image: linear-gradient(transparent, black 20px, black calc(100% - 20px), transparent);
}

.chat-area::-webkit-scrollbar { width: 3px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

.msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  animation: msgIn 0.3s ease-out;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user {
  align-self: flex-end;
  background: var(--accent-dim);
  border: 1px solid var(--accent-glow);
  color: var(--accent);
}

.msg.ai {
  align-self: flex-start;
  background: var(--surface2);
  border: 1px solid transparent;
  color: var(--text);
}

.msg.system {
  align-self: center;
  background: transparent;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  padding: 4px 0;
}

.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 24px 0 16px;
}

.mic-btn {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 2px solid var(--surface2);
  background: var(--surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  position: relative;
  -webkit-user-select: none;
  user-select: none;
  touch-action: none;
}

.mic-btn:hover { border-color: var(--accent-dim); }

.mic-btn svg { width: 28px; height: 28px; fill: var(--text-muted); transition: fill 0.2s; }

.mic-btn.listening {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-dim), 0 0 30px var(--accent-glow);
}
.mic-btn.listening svg { fill: var(--accent); }

.mic-btn.listening::after {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1.5px solid var(--accent);
  opacity: 0;
  animation: pulse 1.5s ease-out infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(1.4); opacity: 0; }
}

.mic-btn.processing {
  border-color: var(--accent);
  opacity: 0.6;
  pointer-events: none;
}

.mic-btn:disabled { opacity: 0.3; pointer-events: none; }

.hint {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
  height: 16px;
}

.debug-toggle {
  position: fixed;
  bottom: 12px;
  right: 12px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  background: var(--surface);
  border: 1px solid var(--surface2);
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  z-index: 10;
}

.debug-panel {
  position: fixed;
  bottom: 40px;
  right: 12px;
  width: 380px;
  max-height: 260px;
  overflow-y: auto;
  background: var(--surface);
  border: 1px solid var(--surface2);
  border-radius: 8px;
  padding: 10px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  line-height: 1.6;
  display: none;
  z-index: 10;
}

.debug-panel.show { display: block; }
.debug-panel .log-send { color: var(--accent); }
.debug-panel .log-recv { color: #60a0ff; }
.debug-panel .log-err { color: var(--red); }

/* Face recognition panel */
#facePanel {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
}

#facePanel.hidden { display: none; }

#faceVideo {
  width: 100%;
  max-width: 360px;
  border-radius: var(--radius);
  border: 2px solid var(--surface2);
  background: var(--surface);
  transform: scaleX(-1);
}

#faceStatus {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 1px;
  text-align: center;
  min-height: 20px;
}

#faceStatus.success { color: var(--accent); }
#faceStatus.error { color: var(--red); }

.skip-btn {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  background: var(--surface);
  border: 1px solid var(--surface2);
  border-radius: 8px;
  padding: 6px 16px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
  margin-top: 4px;
}

.skip-btn:hover {
  border-color: var(--accent-dim);
  color: var(--text);
}

.voice-ui.hidden { display: none; }
</style>
</head>
<body>
<div id="app">
  <header>XIAOZHI VOICE</header>
  <div id="facePanel">
    <video id="faceVideo" autoplay muted playsinline></video>
    <div id="faceStatus">正在加载人脸模型...</div>
    <button class="skip-btn" id="skipBtn" onclick="skipFaceRecognition()">跳过识别</button>
  </div>
  <div class="voice-ui hidden" id="voiceUI">
    <div class="status-bar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">未连接</span>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <div class="controls">
      <button class="mic-btn" id="micBtn" disabled>
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <div class="hint" id="hint">正在连接...</div>
    </div>
  </div>
</div>

<button class="debug-toggle" onclick="document.getElementById('debugPanel').classList.toggle('show')">LOG</button>
<div class="debug-panel" id="debugPanel"></div>

<script>
const TARGET_RATE = 16000;   // Server expects 16kHz Opus
const FRAME_DURATION = 0.06; // 60ms per Opus frame
const BASE_WS_URL = 'ws://localhost:8082/xiaozhi/v1?device_mac=AA:BB:CC:DD:EE:FF';
const FACE_API_URL = 'http://localhost:8080/api/face/list';
const FACE_MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';

let wsUrl = BASE_WS_URL;
let appState = 'FACE_SCAN'; // FACE_SCAN | CONNECTING | READY
let recognizedName = null;
let faceStream = null;
let faceDetectionTimer = null;

// ── State ──
let ws = null;
let audioCtx = null;
let stream = null;
let encoder = null;
let decoder = null;
let isRecording = false;
let isPlaying = false;
let encodeTs = 0;
let decodeTs = 0;
let nextPlayTime = 0;
let sessionId = null;
let ttsTimeout = null;

// ── DOM ──
const facePanel = document.getElementById('facePanel');
const faceVideo = document.getElementById('faceVideo');
const faceStatusEl = document.getElementById('faceStatus');
const voiceUI = document.getElementById('voiceUI');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const chatArea = document.getElementById('chatArea');
const micBtn = document.getElementById('micBtn');
const hint = document.getElementById('hint');
const debugPanel = document.getElementById('debugPanel');

// ── Logging ──
function log(cls, text) {
  const line = document.createElement('div');
  line.className = cls;
  const ts = new Date().toLocaleTimeString('en', { hour12: false, fractionalSecondDigits: 1 });
  line.textContent = `[${ts}] ${text}`;
  debugPanel.appendChild(line);
  debugPanel.scrollTop = debugPanel.scrollHeight;
}

function addMsg(type, text) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function setStatus(state, text) {
  statusDot.className = `status-dot ${state}`;
  statusText.textContent = text;
}

function setHint(text) { hint.textContent = text; }

// ── OpusHead for WebCodecs decoder ──
function createOpusHead() {
  const h = new Uint8Array(19);
  h.set([0x4F,0x70,0x75,0x73,0x48,0x65,0x61,0x64]); // "OpusHead"
  h[8] = 1;  // version
  h[9] = 1;  // channels
  h[10] = 0; h[11] = 0; // pre-skip
  h[12] = 0x80; h[13] = 0xBB; h[14] = 0; h[15] = 0; // 48000 LE
  h[16] = 0; h[17] = 0; // gain
  h[18] = 0; // mapping
  return h;
}

// ── Audio Setup ──
let actualRate = 48000; // will be set to real AudioContext rate
let frameSize = 960;    // will be recalculated

async function initAudio() {
  // Let browser choose its preferred sample rate (Chrome often only supports 48kHz)
  audioCtx = new AudioContext();
  actualRate = audioCtx.sampleRate;
  frameSize = Math.round(actualRate * FRAME_DURATION); // e.g. 48000*0.06=2880
  log('', `AudioContext sampleRate: ${actualRate}, frameSize: ${frameSize}`);

  // Opus encoder - must match AudioContext sample rate
  encoder = new AudioEncoder({
    output: (chunk) => {
      if (!ws || ws.readyState !== 1 || !isRecording) return;
      const data = new ArrayBuffer(chunk.byteLength);
      chunk.copyTo(data);
      ws.send(data);
    },
    error: (e) => {
      log('log-err', `Encoder: ${e.message}`);
      // Re-create encoder on error
      try {
        encoder.configure({
          codec: 'opus',
          sampleRate: actualRate,
          numberOfChannels: 1,
          bitrate: 24000,
        });
        log('', 'Encoder re-configured');
      } catch (ex) { log('log-err', `Encoder reconfig: ${ex.message}`); }
    }
  });

  encoder.configure({
    codec: 'opus',
    sampleRate: actualRate,  // Match AudioContext (e.g. 48kHz)
    numberOfChannels: 1,
    bitrate: 24000,
  });

  // Opus decoder - Opus standard output is 48kHz
  decoder = new AudioDecoder({
    output: (audioData) => {
      const frames = audioData.numberOfFrames;
      const decRate = audioData.sampleRate;
      const pcm = new Float32Array(frames);
      audioData.copyTo(pcm, { planeIndex: 0 });
      audioData.close();

      const buffer = audioCtx.createBuffer(1, frames, decRate);
      buffer.getChannelData(0).set(pcm);

      const src = audioCtx.createBufferSource();
      src.buffer = buffer;
      src.connect(audioCtx.destination);

      const now = audioCtx.currentTime;
      if (nextPlayTime < now) nextPlayTime = now + 0.02;
      src.start(nextPlayTime);
      nextPlayTime += buffer.duration;
    },
    error: (e) => log('log-err', `Decoder: ${e.message}`)
  });

  decoder.configure({
    codec: 'opus',
    sampleRate: 48000,
    numberOfChannels: 1,
    description: createOpusHead(),
  });

  log('', 'Audio engine initialized (WebCodecs Opus)');
}

// ── Microphone (ScriptProcessorNode for broad compatibility) ──
let scriptNode = null;
let pcmBuffer = null;
let pcmBufferIdx = 0;

async function startMic() {
  pcmBuffer = new Float32Array(frameSize); // init after frameSize is calculated
  pcmBufferIdx = 0;
  stream = await navigator.mediaDevices.getUserMedia({
    audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
  });
  const source = audioCtx.createMediaStreamSource(stream);

  // ScriptProcessorNode: 4096 buffer, 1 input channel, 1 output channel
  scriptNode = audioCtx.createScriptProcessor(4096, 1, 1);
  scriptNode.onaudioprocess = (e) => {
    if (!isRecording) return;
    const input = e.inputBuffer.getChannelData(0);
    for (let i = 0; i < input.length; i++) {
      pcmBuffer[pcmBufferIdx++] = input[i];
      if (pcmBufferIdx >= frameSize) {
        try {
          const ad = new AudioData({
            format: 'f32-planar',
            sampleRate: actualRate,
            numberOfFrames: frameSize,
            numberOfChannels: 1,
            timestamp: encodeTs,
            data: pcmBuffer.slice().buffer,
          });
          encoder.encode(ad);
          ad.close();
          encodeTs += FRAME_DURATION * 1000000;
        } catch (err) {
          log('log-err', `Encode: ${err.message}`);
        }
        pcmBufferIdx = 0;
      }
    }
  };
  source.connect(scriptNode);
  scriptNode.connect(audioCtx.destination);
}

function stopMic() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  if (scriptNode) {
    scriptNode.disconnect();
    scriptNode = null;
  }
  pcmBufferIdx = 0;
}

// ── Face Recognition ──
function setFaceStatus(text, cls = '') {
  faceStatusEl.textContent = text;
  faceStatusEl.className = cls;
}

async function loadFaceModels() {
  setFaceStatus('正在加载人脸模型...');
  log('', 'Loading face-api.js models from CDN...');
  await Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(FACE_MODEL_URL),
    faceapi.nets.faceLandmark68TinyNet.loadFromUri(FACE_MODEL_URL),
    faceapi.nets.faceRecognitionNet.loadFromUri(FACE_MODEL_URL),
  ]);
  log('', 'Face models loaded');
}

async function fetchRegisteredFaces() {
  setFaceStatus('正在获取已注册人脸...');
  log('', `Fetching registered faces from ${FACE_API_URL}`);
  try {
    const resp = await fetch(FACE_API_URL);
    const json = await resp.json();
    if (json.code !== 200 || !json.data || json.data.length === 0) {
      log('log-err', 'No registered faces found');
      return [];
    }
    const faces = json.data.map(f => ({
      name: f.name,
      descriptor: new Float32Array(JSON.parse(f.descriptor)),
    }));
    log('', `Loaded ${faces.length} registered face(s)`);
    return faces;
  } catch (err) {
    log('log-err', `Failed to fetch faces: ${err.message}`);
    return [];
  }
}

function stopFaceCamera() {
  if (faceDetectionTimer) {
    clearInterval(faceDetectionTimer);
    faceDetectionTimer = null;
  }
  if (faceStream) {
    faceStream.getTracks().forEach(t => t.stop());
    faceStream = null;
  }
}

async function startFaceRecognition() {
  // Request camera + microphone permissions together (single browser prompt)
  setFaceStatus('正在请求摄像头和麦克风权限...');
  try {
    const combinedStream = await navigator.mediaDevices.getUserMedia({
      video: { width: 480, height: 360, facingMode: 'user' },
      audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
    // Keep video tracks for face recognition, stop audio tracks (will re-acquire in startMic)
    combinedStream.getAudioTracks().forEach(t => t.stop());
    faceStream = new MediaStream(combinedStream.getVideoTracks());
  } catch (err) {
    log('log-err', `Permission error: ${err.message}`);
    setFaceStatus('无法获取摄像头/麦克风权限，请点击跳过识别', 'error');
    return;
  }

  try {
    await loadFaceModels();
  } catch (err) {
    log('log-err', `Failed to load face models: ${err.message}`);
    setFaceStatus('人脸模型加载失败，请点击跳过识别', 'error');
    return;
  }

  const registeredFaces = await fetchRegisteredFaces();
  if (registeredFaces.length === 0) {
    setFaceStatus('暂无已注册人脸，请在管理后台注册人脸或跳过识别', 'error');
    return;
  }

  // Build face matcher
  const labeledDescriptors = [];
  const nameMap = {};
  registeredFaces.forEach((f, i) => {
    const label = `face_${i}`;
    nameMap[label] = f.name;
    labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(label, [f.descriptor]));
  });
  const faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);

  // Camera already open from combined permission request
  faceVideo.srcObject = faceStream;
  log('', 'Starting face detection loop');

  let matchCount = 0;
  let lastMatchName = null;

  faceDetectionTimer = setInterval(async () => {
    try {
      const detections = await faceapi
        .detectAllFaces(faceVideo, new faceapi.TinyFaceDetectorOptions())
        .withFaceLandmarks(true)
        .withFaceDescriptors();

      if (detections.length === 0) {
        matchCount = 0;
        lastMatchName = null;
        setFaceStatus('未检测到人脸，请面对摄像头...');
        return;
      }

      // Use the largest detected face
      const best = detections.reduce((a, b) =>
        a.detection.box.area > b.detection.box.area ? a : b
      );

      const match = faceMatcher.findBestMatch(best.descriptor);
      if (match.label === 'unknown') {
        matchCount = 0;
        lastMatchName = null;
        setFaceStatus('人脸不匹配，请确认已注册...');
        return;
      }

      const name = nameMap[match.label];
      if (name === lastMatchName) {
        matchCount++;
      } else {
        matchCount = 1;
        lastMatchName = name;
      }

      setFaceStatus(`识别中: ${name} (${Math.round((1 - match.distance) * 100)}% 置信度)`, 'success');
      log('', `Face match: ${name}, distance=${match.distance.toFixed(3)}, count=${matchCount}`);

      // Require 3 consecutive matches for stability
      if (matchCount >= 3) {
        onFaceRecognized(name);
      }
    } catch (err) {
      log('log-err', `Face detection error: ${err.message}`);
    }
  }, 500);
}

function onFaceRecognized(name) {
  recognizedName = name;
  stopFaceCamera();
  wsUrl = `${BASE_WS_URL}&username=${encodeURIComponent(name)}`;
  log('', `Face recognized: ${name}, WS URL: ${wsUrl}`);
  transitionToVoiceUI(`欢迎, ${name}!`);
}

function skipFaceRecognition() {
  stopFaceCamera();
  recognizedName = null;
  wsUrl = BASE_WS_URL;
  log('', 'Face recognition skipped');
  transitionToVoiceUI('已跳过人脸识别');
}

async function transitionToVoiceUI(message) {
  appState = 'CONNECTING';
  facePanel.classList.add('hidden');
  voiceUI.classList.remove('hidden');
  addMsg('system', message);

  try {
    await initAudio();
    await startMic();
    connect();
  } catch (err) {
    setStatus('error', '初始化失败');
    setHint(err.message);
    log('log-err', err.stack);
    addMsg('system', `初始化失败: ${err.message}\n请确保已允许麦克风权限`);
  }
}

// ── WebSocket ──
function connect() {
  setStatus('', '连接中...');
  log('', `Connecting to ${wsUrl}`);

  ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    log('log-send', 'Connected, sending hello');
    wsSend({ type: 'hello' });
  };

  ws.onclose = (e) => {
    setStatus('error', `已断开 (${e.code})`);
    log('log-err', `Disconnected: ${e.code} ${e.reason}`);
    isPlaying = false;
    isRecording = false;
    micBtn.classList.remove('processing', 'listening');
    micBtn.disabled = true;
    setHint('连接已断开，5秒后重连...');
    setTimeout(connect, 5000);
  };

  ws.onerror = () => {
    setStatus('error', '连接失败');
    log('log-err', 'WebSocket error');
  };

  ws.onmessage = (event) => {
    if (event.data instanceof ArrayBuffer) {
      // Binary: Opus audio from TTS - just queue it, don't let errors kill the connection
      const bytes = new Uint8Array(event.data);
      if (bytes.length < 2) return; // skip empty frames
      try {
        const chunk = new EncodedAudioChunk({
          type: 'key',
          timestamp: decodeTs,
          data: event.data,
        });
        decoder.decode(chunk);
        decodeTs += 60000;
      } catch (err) {
        log('log-err', `Decode: ${err.message}`);
        try {
          decoder.reset();
          decoder.configure({
            codec: 'opus',
            sampleRate: 48000,
            numberOfChannels: 1,
            description: createOpusHead(),
          });
          decodeTs = 0;
        } catch (e) { /* ignore */ }
      }
      return;
    }

    // Text: JSON protocol message
    let msg;
    try { msg = JSON.parse(event.data); } catch { return; }
    log('log-recv', `${msg.type} ${msg.state || msg.text || ''}`);

    switch (msg.type) {
      case 'hello':
        sessionId = msg.session_id;
        setStatus('connected', '已连接');
        micBtn.disabled = false;
        setHint('按住说话，松开发送');
        addMsg('system', '已连接到小智服务');
        break;

      case 'stt':
        if (msg.text) addMsg('user', msg.text);
        break;

      case 'tts':
        if (msg.state === 'start') {
          isPlaying = true;
          nextPlayTime = 0;
          decodeTs = 0;
          micBtn.classList.add('processing');
          setHint('小智正在回复...');
          // Safety timeout: recover UI if tts stop never arrives
          clearTimeout(ttsTimeout);
          ttsTimeout = setTimeout(() => {
            if (isPlaying) {
              log('log-err', 'TTS timeout, recovering UI');
              isPlaying = false;
              micBtn.classList.remove('processing');
              setHint('按住说话，松开发送');
            }
          }, 30000);
        }
        if (msg.state === 'sentence_start' && msg.text) {
          addMsg('ai', msg.text);
        }
        if (msg.state === 'stop') {
          clearTimeout(ttsTimeout);
          isPlaying = false;
          micBtn.classList.remove('processing');
          setHint('按住说话，松开发送');
        }
        break;

      case 'llm':
        // emotion/display info, optional
        break;
    }
  };
}

function wsSend(obj) {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify(obj));
    log('log-send', `${obj.type} ${obj.state || obj.mode || ''}`);
  }
}

// ── Push-to-talk ──
function startListening() {
  if (isPlaying) {
    // Interrupt TTS
    wsSend({ type: 'abort', reason: 'user_interrupted' });
    isPlaying = false;
    nextPlayTime = 0;
    micBtn.classList.remove('processing');
  }

  isRecording = true;
  encodeTs = 0;
  micBtn.classList.add('listening');
  setHint('正在录音...');
  wsSend({ type: 'listen', mode: 'manual', state: 'start' });
}

function stopListening() {
  if (!isRecording) return;
  isRecording = false;
  micBtn.classList.remove('listening');
  setHint('处理中...');
  wsSend({ type: 'listen', mode: 'manual', state: 'stop' });
}

// ── Button events (mouse + touch) ──
micBtn.addEventListener('mousedown', (e) => { e.preventDefault(); startListening(); });
micBtn.addEventListener('mouseup', (e) => { e.preventDefault(); stopListening(); });
micBtn.addEventListener('mouseleave', () => { if (isRecording) stopListening(); });
micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startListening(); });
micBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopListening(); });

// ── Check WebCodecs support ──
function checkSupport() {
  if (typeof AudioEncoder === 'undefined' || typeof AudioDecoder === 'undefined') {
    setStatus('error', '浏览器不支持');
    setHint('请使用 Chrome 94+ 或 Edge 94+');
    addMsg('system', '此浏览器不支持 WebCodecs API，请使用最新版 Chrome 或 Edge');
    return false;
  }
  return true;
}

// ── Init ──
// Global error handler to prevent page from freezing
window.addEventListener('unhandledrejection', (e) => {
  log('log-err', `Unhandled: ${e.reason}`);
  e.preventDefault();
});
window.addEventListener('error', (e) => {
  log('log-err', `Error: ${e.message}`);
});

async function init() {
  if (!checkSupport()) return;
  // Start with face recognition phase
  startFaceRecognition();
}

init();
</script>
