version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: clda-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-clda123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-clda}
    volumes:
      - ../sql/clda-20250615.sql:/docker-entrypoint-initdb.d/01-init.sql
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - clda-net

  redis:
    image: redis:7-alpine
    container_name: clda-redis
    ports:
      - "6379:6379"
    networks:
      - clda-net

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: clda-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clda-net

  clda-admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
    container_name: clda-admin
    environment:
      # 激活生产配置
      SPRING_PROFILES_ACTIVE: prod
      # MySQL
      SPRING_DATASOURCE_DRUID_MASTER_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-clda}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
      SPRING_DATASOURCE_DRUID_MASTER_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_DRUID_MASTER_PASSWORD: ${MYSQL_ROOT_PASSWORD:-clda123}
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-clda}
      # OCR 配置（容器内 Tesseract 5 的路径）
      CLDA_OCR_TESSDATA__PATH: /usr/share/tesseract-ocr/5/tessdata
      CLDA_OCR_LANGUAGE: chi_sim+eng
      # JNA 找 libtesseract（debian x86_64 路径）
      JAVA_OPTS: "-Djna.library.path=/usr/lib/x86_64-linux-gnu"
      # 图片增强服务
      CLDA_ENHANCE_URL: http://clda-enhance:8090
      CLDA_ENHANCE_ENABLED: "true"
      # JWT 密钥（生产环境必须设置强密钥）
      TOKEN_SECRET: ${TOKEN_SECRET}
      # CORS 允许的源（生产环境设置为实际域名）
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      # Druid 监控台凭据
      DRUID_STAT_USERNAME: ${DRUID_STAT_USERNAME:-clda}
      DRUID_STAT_PASSWORD: ${DRUID_STAT_PASSWORD}
      # 设备 WebSocket 地址（OTA 返回给 ESP32 的地址，需公网可达）
      CHAT_WS_URL: ${CHAT_WS_URL:-ws://clda-chat:8082/clda/v1}
      # LLM（初始值，可在管理端 AI 配置页面修改）
      LLM_API_KEY: ${LLM_API_KEY:-sk-placeholder}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - clda-net

  clda-chat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.chat
    container_name: clda-chat
    environment:
      # ASR 模型路径
      MODEL_ASR_SENSE__VOICE_MODEL__DIR: /opt/models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17
      # Feign 调用 admin 服务
      CHAT_SERVER_MANAGE__URL: http://clda-admin:8080
      # LLM 配置（语音对话用，兼容 OpenAI 协议）
      CHAT_CLIENT_APIKEY: ${CHAT_LLM_API_KEY:-}
      CHAT_CLIENT_URL: ${CHAT_LLM_BASE_URL:-https://open.bigmodel.cn/api/paas}
      CHAT_CLIENT_MODEL: ${CHAT_LLM_MODEL:-glm-4-flash}
      CHAT_CLIENT_PATH: ${CHAT_LLM_PATH:-/v4/chat/completions}
      # TTS 配置（火山引擎）
      MODEL_TTS_VOLC__TTS_APPID: ${VOLC_TTS_APPID:-}
      MODEL_TTS_VOLC__TTS_ACCESS__TOKEN: ${VOLC_TTS_TOKEN:-}
    ports:
      - "8082:8082"
    volumes:
      - ../sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17:/opt/models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17:ro
    depends_on:
      - clda-admin
    networks:
      - clda-net

  clda-enhance:
    build:
      context: ../clda-enhance
      dockerfile: Dockerfile
    container_name: clda-enhance
    ports:
      - "8090:8090"
    networks:
      - clda-net

  nginx:
    image: nginx:alpine
    container_name: clda-nginx
    ports:
      - "80:80"
    volumes:
      - ../clda-ui/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - clda-admin
    networks:
      - clda-net

volumes:
  mysql-data:
  minio-data:

networks:
  clda-net:
    driver: bridge
