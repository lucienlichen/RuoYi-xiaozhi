# 数据源配置
spring:
    datasource:
        type: com.alibaba.druid.pool.DruidDataSource
        driverClassName: com.mysql.cj.jdbc.Driver
        druid:
            # 主库数据源
            master:
                url: ${SPRING_DATASOURCE_DRUID_MASTER_URL:jdbc:mysql://localhost:3306/clda?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8}
                username: ${SPRING_DATASOURCE_DRUID_MASTER_USERNAME:root}
                password: ${SPRING_DATASOURCE_DRUID_MASTER_PASSWORD:root}
            # 从库数据源
            slave:
                enabled: false
                url:
                username:
                password:
            # 连接池配置
            initialSize: 5
            minIdle: 10
            maxActive: 20
            maxWait: 60000
            connectTimeout: 30000
            socketTimeout: 60000
            timeBetweenEvictionRunsMillis: 60000
            minEvictableIdleTimeMillis: 300000
            maxEvictableIdleTimeMillis: 900000
            validationQuery: SELECT 1 FROM DUAL
            testWhileIdle: true
            testOnBorrow: false
            testOnReturn: false
            webStatFilter:
                enabled: true
            statViewServlet:
                enabled: ${DRUID_STAT_ENABLED:true}
                # 设置白名单，不填则允许所有访问
                allow: ${DRUID_STAT_ALLOW:}
                url-pattern: /druid/*
                # 控制台管理用户名和密码
                login-username: ${DRUID_STAT_USERNAME:clda}
                login-password: ${DRUID_STAT_PASSWORD:123456}
            filter:
                stat:
                    enabled: true
                    log-slow-sql: true
                    slow-sql-millis: 1000
                    merge-sql: true
                wall:
                    config:
                        multi-statement-allow: true
