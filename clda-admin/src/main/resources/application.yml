# 项目相关配置
clda:
  # 名称
  name: CLDA
  # 版本
  version: 3.8.9
  # 版权年份
  copyrightYear: 2025
  # 文件路径（通过 profile 覆盖：dev 用本地路径，prod 用容器路径）
  profile: ${CLDA_PROFILE_PATH:/home/clda/uploadPath}
  # 获取ip地址开关
  addressEnabled: false
  # OCR配置
  ocr:
    tessdata-path: ${CLDA_OCR_TESSDATA_PATH:/usr/local/share/tessdata}
    language: ${CLDA_OCR_LANGUAGE:chi_sim+eng}
    library-path: ${CLDA_OCR_LIBRARY_PATH:/usr/local/lib}
  # 图片增强服务
  enhance:
    url: ${CLDA_ENHANCE_URL:http://localhost:8090}
    timeout: 30000
    enabled: ${CLDA_ENHANCE_ENABLED:true}
  # LLM结构化
  structuring:
    enabled: ${CLDA_STRUCTURING_ENABLED:true}
  # MinIO 对象存储（密钥无默认值，dev profile 和 prod 环境变量分别提供）
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket: ${MINIO_BUCKET:clda}
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 设备 WebSocket 地址（OTA 激活响应返回给 ESP32 的地址）
# 生产环境需设置为公网可达地址，如: wss://your-domain.com/clda/v1
# 为空时回退到本机 IP 自动拼接（仅适用于单机开发）
chat:
  ws:
    url: ${CHAT_WS_URL:}

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    accept-count: 1000
    threads:
      max: 800
      min-spare: 100

# 用户配置
user:
  password:
    maxRetryCount: 5
    lockTime: 10

# Spring配置
spring:
  messages:
    basename: i18n/messages
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
    group:
      dev: druid
      prod: druid
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
  # Spring AI (LLM结构化)
  ai:
    openai:
      api-key: ${LLM_API_KEY:sk-placeholder}
      base-url: ${LLM_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${LLM_MODEL:gpt-4o-mini}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: 0
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms

# token配置（密钥无默认值，dev profile 和 prod 环境变量分别提供）
token:
  header: Authorization
  secret: ${TOKEN_SECRET:}
  expireTime: ${TOKEN_EXPIRE_TIME:30}

# MyBatis Plus配置
mybatis-plus:
  typeAliasesPackage: com.clda.**.domain
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# 防止XSS攻击
xss:
  enabled: true
  excludes: /system/notice
  urlPatterns: /system/*,/monitor/*,/tool/*
